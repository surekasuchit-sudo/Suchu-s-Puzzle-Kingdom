<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suchu's Puzzle Kingdom</title>
    
    <!-- PWA Settings for Home Screen Icon -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Puzzle Kingdom">
    
    <style>
        :root {
            --bg-color: #121212;
            --tile-color: #2a2a2a;
            --accent-color: #bb86fc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; color: var(--accent-color); }

        #puzzle-container {
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            border: 5px solid var(--accent-color);
            border-radius: 8px;
            background-color: var(--accent-color);
            position: relative;
        }

        .tile {
            background-color: var(--tile-color);
            background-size: 300% 300%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        .empty {
            background: transparent !important;
            cursor: default;
        }

        #controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background-color: var(--accent-color);
            color: black;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>PUZZLE KINGDOM</h1>

    <div id="puzzle-container"></div>

    <div id="controls">
        <button onclick="shuffleGame()">Shuffle</button>
    </div>

    <script>
        // EDIT THIS LINK TO CHANGE THE IMAGE FROM HOME
        const IMAGE_URL = 'https://picsum.photos/600/600'; 
        
        const size = 3;
        let tiles = [];
        const container = document.getElementById('puzzle-container');

        function createPuzzle() {
            tiles = [...Array(size * size).keys()];
            render();
        }

        function render() {
            container.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = 'tile' + (tile === 0 ? ' empty' : '');
                
                if (tile !== 0) {
                    const row = Math.floor((tile - 1) / size);
                    const col = (tile - 1) % size;
                    div.style.backgroundImage = `url('${IMAGE_URL}')`;
                    div.style.backgroundPosition = `${(col / (size - 1)) * 100}% ${(row / (size - 1)) * 100}%`;
                }
                
                div.addEventListener('click', () => moveTile(index));
                container.appendChild(div);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(0);
            const validMoves = [index - 1, index + 1, index - size, index + size];

            if (validMoves.includes(emptyIndex)) {
                // Prevent horizontal wrap-around
                if (Math.abs(emptyIndex - index) === 1 && Math.floor(emptyIndex / size) !== Math.floor(index / size)) return;

                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                render();
                checkWin();
            }
        }

        function shuffleGame() {
            for (let i = 0; i < 200; i++) {
                const emptyIndex = tiles.indexOf(0);
                const adj = [emptyIndex - 1, emptyIndex + 1, emptyIndex - size, emptyIndex + size]
                    .filter(i => i >= 0 && i < size * size);
                const randomMove = adj[Math.floor(Math.random() * adj.length)];
                [tiles[emptyIndex], tiles[randomMove]] = [tiles[randomMove], tiles[emptyIndex]];
            }
            render();
        }

        function checkWin() {
            const win = tiles.every((tile, i) => tile === (i + 1) % (size * size));
            if (win) setTimeout(() => alert('You solved the Kingdom!'), 200);
        }

        createPuzzle();
    </script>
</body>
</html>
